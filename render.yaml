services:
  # 1. Redis Cache Instance
  - type: redis
    name: tripgenie-redis
    ipAllowList: [] # Access only internally
    plan: free

  # 2. Python FastAPI Web Service
  - type: web
    name: tripgenie-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python test_db.py; python seed_indian_trips.py; uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
      - key: REDIS_URL
        fromService:
          type: redis
          name: tripgenie-redis
          property: connectionString
      - key: DATABASE_URL
        sync: false # User will set this in Render dashboard to their Neon Postgres connection string
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
